<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Echoes in the Dark</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="app">
        <!-- Intro Screen -->
        <div id="intro-screen" class="screen active">
            <h1>Blind Sight</h1>
            <p>A game played with your eyes closed.</p>
            <p class="instruction">
                1. Allow Camera Access<br>
                2. Turn up your volume<br>
                3. Close your eyes to enter the world
            </p>
            <button id="start-btn">Enable Camera & Connect</button>
            <div id="loading" class="hidden">Initializing Camera...<br>Please center your face.</div>
        </div>

        <!-- Main Game Interface (Mostly hidden/dimmed) -->
        <div id="game-screen" class="screen hidden">
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div id="status-overlay">
                <div id="eye-status">EYES OPEN - SIMULATION PAUSED</div>
                <div id="gesture-feedback"></div>
            </div>

            <div id="visualizer">
                <!-- Simple audio visualizer bars -->
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="./main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
